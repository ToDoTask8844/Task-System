<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .todo-container {
            max-width: 700px;
            margin: 50px auto;
        }

        .completed .task-text {
            text-decoration: line-through;
            color: gray;
        }

        .filter-btn.active {
            background-color: #0d6efd;
            color: white;
        }
    </style>
</head>

<body>

    <div class="container todo-container">
        <div class="card shadow">
            <div class="card-body">

                <h1 class="text-center mb-4">
                    📝 To-Do List
                </h1>

                <!-- Add Task Form -->
                <form id="todo-form" class="d-flex gap-2 mb-3">
                    <input type="text" id="todo-input" class="form-control" placeholder="Enter a task..." required>

                    <button type="submit" class="btn btn-primary">
                        Add Task
                    </button>
                </form>

                <!-- Filter Buttons -->
                <div class="text-center mb-3">
                    <button class="btn btn-outline-primary filter-btn active" data-filter="all">
                        All
                    </button>

                    <button class="btn btn-outline-success filter-btn" data-filter="active">
                        Active
                    </button>

                    <button class="btn btn-outline-secondary filter-btn" data-filter="completed">
                        Completed
                    </button>
                </div>

                <!-- Todo List -->
                <ul id="todo-list" class="list-group">
                </ul>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Your JavaScript File -->
    <script src="script.js"></script>

</body>

</html>
